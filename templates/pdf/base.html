{% load static %}<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <style>
        @page {
            size: A4;
            margin: 2cm 1.5cm;
            @bottom-center {
                content: "Página " counter(page) " de " counter(pages);
                font-family: Helvetica, sans-serif;
                font-size: 8pt;
                color: #888;
            }
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 9.5pt;
            color: #1a1a1a;
            margin: 0;
        }
        h1 { font-size: 18pt; margin: 0 0 4px 0; color: #3d85c6; }
        h2 { font-size: 13pt; margin: 12px 0 6px 0; color: #3d85c6; border-bottom: 1px solid #d0e2f3; padding-bottom: 2px; }
        h3 { font-size: 11pt; margin: 10px 0 4px 0; color: #555; }
        p { margin: 4px 0; }
        table { width: 100%; border-collapse: collapse; margin: 4px 0; }
        th, td { padding: 4px 6px; text-align: left; vertical-align: top; }
        th { background: #d0e2f3; color: #1a1a1a; font-weight: bold; font-size: 9pt; }
        tr.totals td { border-top: 2px solid #3d85c6; font-weight: bold; }
        td.num, th.num { text-align: right; font-family: "Courier New", monospace; white-space: nowrap; }
        .small { font-size: 8.5pt; color: #666; }
        .muted { color: #888; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #3d85c6; padding-bottom: 10px; margin-bottom: 16px; }
        .header .right { text-align: right; }
        .kvs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 18px; margin: 8px 0; }
        .kvs .label { color: #888; }
        .kvs .value { font-weight: bold; }
        .signature { margin-top: 36px; display: flex; justify-content: space-between; }
        .signature .box { width: 45%; text-align: center; font-size: 9pt; color: #666; }
        .signature .line { border-top: 1px solid #1a1a1a; padding-top: 4px; margin-top: 50px; }
        .pagebreak { page-break-after: always; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 8pt; }
        .badge.approved { background: #d4edda; color: #155724; }
        .badge.draft { background: #e2e3e5; color: #383d41; }
        .badge.submitted { background: #fff3cd; color: #856404; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
