{% extends "auth_base.html" %}

{% block title %}Salir · Mamsys{% endblock %}
{% block subtitle %}¿Cerrar sesión?{% endblock %}

{% block content %}
<form method="post" class="space-y-4">
    {% csrf_token %}
    <p class="text-sm text-gray-700">Confirmar que querés cerrar sesión.</p>
    <button type="submit"
            class="w-full bg-brand-mid hover:bg-brand-light text-white font-medium rounded py-2 transition-colors">
        Sí, salir
    </button>
</form>
{% endblock %}
